# Production stack — same shape as staging, distinct domain + volume.
version: "3.9"

networks:
  traefik_default:
    external: true
  internal:
    driver: bridge

volumes:
  pg_data:

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: connector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: connector
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connector"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [internal]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 10s, timeout: 5s, retries: 5 }

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    networks: [traefik_default, internal]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.pmc.rule=Host(`plenty-mirakl.420.ovh`)"
      - "traefik.http.routers.pmc.entrypoints=websecure"
      - "traefik.http.routers.pmc.tls.certresolver=letsencrypt"
      - "traefik.http.services.pmc.loadbalancer.server.port=8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    networks: [internal]
    command: >
      celery -A app.tasks.celery_app.celery_app worker
      -Q orders,tracking,inventory --loglevel=info --concurrency=4

  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    networks: [internal]
    command: >
      celery -A app.tasks.celery_app.celery_app beat
      --loglevel=info --scheduler celery.beat:PersistentScheduler
