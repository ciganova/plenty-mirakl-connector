name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate ephemeral Fernet key for tests
        run: echo "FERNET_KEY=$(python -c 'from cryptography.fernet import Fernet;print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
      - name: Run unit tests
        env:
          # All-mock — no real DB / Redis needed for the unit suite.
          DATABASE_URL: postgresql+asyncpg://x:x@localhost/x
          REDIS_URL: redis://localhost/0
          ADMIN_API_KEY: ci-test-admin-key
          STRIPE_WEBHOOK_SECRET: whsec_ci_test
          STRIPE_SECRET_KEY: sk_test_ci
        run: pytest -v -m "not integration" --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ || true   # non-blocking until baseline gefixt
