version: "3.9"

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  traefik_default:
    external: true          # Must exist before running: docker network create traefik_default
  internal:
    driver: bridge

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  pg_data:

# ─── Services ───────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: connector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: connector
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connector"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI (API Service) ───────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traefik_default
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      # ── Traefik routing ──
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.mirakl-connector.rule=Host(`${TRAEFIK_DOMAIN:-connector.domain.de}`)"
      - "traefik.http.routers.mirakl-connector.entrypoints=websecure"
      - "traefik.http.routers.mirakl-connector.tls.certresolver=letsencrypt"
      - "traefik.http.services.mirakl-connector.loadbalancer.server.port=8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    command: >
      celery -A app.tasks.celery_app.celery_app worker
      -Q orders,tracking,inventory
      --loglevel=info
      --concurrency=4

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    command: >
      celery -A app.tasks.celery_app.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
